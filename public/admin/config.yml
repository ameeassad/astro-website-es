backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

site_url: https://fincamatriz.com
display_url: https://fincamatriz.com
locale: en

collections:

  # ── Photos ──────────────────────────────────────────────────────────────────
  - name: spaces_photos
    label: Space Photos
    label_singular: Space
    folder: src/content/spaces
    create: true
    slug: '{{order}}-{{slug}}'
    summary: '{{name_en}}'
    fields:
      - { label: 'Name (EN)', name: name_en, widget: string }
      - { label: 'Name (ES)', name: name_es, widget: string }
      - { label: 'Name (CA)', name: name_ca, widget: string }
      - { label: 'Description (EN)', name: desc_en, widget: string }
      - { label: 'Description (ES)', name: desc_es, widget: string }
      - { label: 'Description (CA)', name: desc_ca, widget: string }
      - label: Photos
        name: photos
        widget: list
        field: { label: Photo, name: photo, widget: image }
      - { label: Sort order, name: order, widget: number, default: 0 }
      - { label: 'Large card (spans 2 columns)', name: featured, widget: boolean, default: false }

  # ── Rates ────────────────────────────────────────────────────────────────────
  - name: settings
    label: Site Settings
    files:
      - name: rates
        label: Rates & Pricing
        file: src/content/settings/rates.json
        fields:
          - label: Rates (EN)
            name: rates_en
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
          - label: Rates (ES)
            name: rates_es
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
          - label: Rates (CA)
            name: rates_ca
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
          - { label: 'Minimum stay (nights)', name: min_stay, widget: number, default: 2 }

      - name: contact
        label: Contact Details
        file: src/content/settings/contact.json
        fields:
          - { label: Email, name: email, widget: string }
          - { label: Phone, name: phone, widget: string }
          - { label: 'WhatsApp (digits only, e.g. 34612345678)', name: whatsapp, widget: string }
          - { label: 'Address (EN)', name: address_en, widget: string }
          - { label: 'Address (ES)', name: address_es, widget: string }
          - { label: 'Address (CA)', name: address_ca, widget: string }

  # ── FAQ ──────────────────────────────────────────────────────────────────────
  - name: faq
    label: FAQ
    label_singular: Question
    folder: src/content/faq
    create: true
    slug: '{{order}}-{{slug}}'
    summary: '{{question_en}}'
    fields:
      - { label: 'Question (EN)', name: question_en, widget: string }
      - { label: 'Answer (EN)',   name: answer_en,   widget: text }
      - { label: 'Question (ES)', name: question_es, widget: string }
      - { label: 'Answer (ES)',   name: answer_es,   widget: text }
      - { label: 'Question (CA)', name: question_ca, widget: string }
      - { label: 'Answer (CA)',   name: answer_ca,   widget: text }
      - { label: Sort order, name: order, widget: number, default: 0 }

  # ── General text ─────────────────────────────────────────────────────────────
  - name: copy
    label: Page Text
    files:
      - name: en
        label: English
        file: src/content/copy/en.json
        fields:
          - { label: 'Hero subtitle', name: heroSub, widget: string }
          - { label: 'About — main paragraph', name: aboutBody, widget: text }
          - { label: 'About — details line', name: aboutBody2, widget: text }
          - { label: 'Stay — main paragraph', name: stayBody, widget: text }
          - { label: 'Stay — amenities line', name: stayBody2, widget: text }
          - { label: 'Events subtitle', name: eventsSub, widget: text }

      - name: es
        label: Español
        file: src/content/copy/es.json
        fields:
          - { label: 'Subtítulo hero', name: heroSub, widget: string }
          - { label: 'Acerca de — párrafo principal', name: aboutBody, widget: text }
          - { label: 'Acerca de — línea de detalles', name: aboutBody2, widget: text }
          - { label: 'Estancia — párrafo principal', name: stayBody, widget: text }
          - { label: 'Estancia — línea de servicios', name: stayBody2, widget: text }
          - { label: 'Subtítulo eventos', name: eventsSub, widget: text }

      - name: ca
        label: Català
        file: src/content/copy/ca.json
        fields:
          - { label: 'Subtítol hero', name: heroSub, widget: string }
          - { label: 'Sobre la finca — paràgraf principal', name: aboutBody, widget: text }
          - { label: 'Sobre la finca — línia de detalls', name: aboutBody2, widget: text }
          - { label: 'Estada — paràgraf principal', name: stayBody, widget: text }
          - { label: 'Estada — línia de serveis', name: stayBody2, widget: text }
          - { label: 'Subtítol esdeveniments', name: eventsSub, widget: text }
